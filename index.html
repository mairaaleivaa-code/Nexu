<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexu</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f2f1ee; --surface:#fff; --surface2:#f0ede8; --border:#e2ddd6;
    --text:#1a1714; --text-muted:#8a8077;
    --med-color:#2563a8; --med-bg:#dbeeff; --med-border:#93c5fd;
    --nut-color:#9b1c3a; --nut-bg:#fde8ee; --nut-border:#f9a8c0;
    --danger:#c1440e; --danger-light:#fce8e0;
    --warning:#b5651d; --warning-light:#fef3e2;
    --success:#2d6a4f; --success-light:#d8f3dc;
    --promo:#1d6fa4; --promo-light:#dbeeff;
    --track:#e2ddd6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HEADER */
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1.75rem; height:54px; position:relative; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
  .logo { font-family:'Montserrat',sans-serif; font-size:1.1rem; font-weight:800; letter-spacing:-0.02em; }
  .logo span { color:var(--med-color); }
  nav { position:absolute; left:50%; transform:translateX(-50%); display:flex; gap:0.2rem; }
  nav a { text-decoration:none; color:var(--text-muted); font-size:0.8rem; font-weight:500; padding:0.38rem 0.75rem; border-radius:7px; transition:all 0.15s; }
  nav a:hover, nav a.active { background:var(--surface2); color:var(--text); }
  .date-chip { font-size:0.72rem; color:var(--text-muted); background:var(--surface2); padding:0.28rem 0.7rem; border-radius:20px; border:1px solid var(--border); }

  /* MAIN */
  main { max-width:1280px; margin:0 auto; padding:1.5rem; }
  .page-header { position:relative; display:flex; align-items:baseline; gap:0.7rem; margin-bottom:1.25rem; }
  .page-title { font-family:'Montserrat',sans-serif; font-size:1.35rem; font-weight:800; letter-spacing:-0.03em; }
  .page-subtitle { color:var(--text-muted); font-size:0.82rem; }

  /* GRID */
  .materias-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.85rem; margin-bottom:1.25rem; }

  /* CARD */
  .materia-card { background:var(--surface); border-radius:12px; border:1.5px solid var(--border); overflow:visible; transition:box-shadow 0.18s,transform 0.18s; position:relative; }
  .materia-card:hover { box-shadow:0 4px 18px rgba(0,0,0,0.08); transform:translateY(-1px); }
  .materia-card.medicina { border-color:var(--med-border); }
  .materia-card.nutricion { border-color:var(--nut-border); }

  .card-top { padding:0.85rem 1rem 0.75rem; overflow:visible; }
  .card-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:0.4rem; margin-bottom:0.5rem; }
  .materia-nombre { font-family:'Montserrat',sans-serif; font-size:0.92rem; font-weight:700; line-height:1.2; flex:1; }

  .carrera-chip { font-size:0.62rem; font-weight:700; padding:0.18rem 0.5rem; border-radius:6px; flex-shrink:0; text-transform:uppercase; letter-spacing:0.04em; }
  .chip-medicina { background:var(--med-bg); color:var(--med-color); }
  .chip-nutricion { background:var(--nut-bg); color:var(--nut-color); }

  /* META ROW */
  .meta-row { display:flex; align-items:center; gap:0.35rem; margin-bottom:0.6rem; flex-wrap:wrap; position:relative; }

  .tipo-chip { font-size:0.62rem; font-weight:600; padding:0.15rem 0.42rem; border-radius:6px; cursor:pointer; }
  .tipo-regular { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
  .tipo-promocional { background:var(--promo-light); color:var(--promo); }

  .cuatri-chip { font-size:0.62rem; color:var(--text-muted); background:var(--surface2); padding:0.15rem 0.42rem; border-radius:6px; border:1px solid var(--border); cursor:pointer; white-space:nowrap; }
  .cuatri-chip:hover { background:var(--border); }

  /* FALTAS */
  .faltas-chip { font-weight:700 !important; cursor:pointer; }
  .faltas-ok { background:var(--success-light) !important; color:var(--success) !important; border-color:#6ee7b7 !important; }
  .faltas-riesgo { background:var(--warning-light) !important; color:var(--warning) !important; border-color:#fbbf24 !important; }
  .faltas-llena { background:var(--danger-light) !important; color:var(--danger) !important; border-color:#fca5a5 !important; }

  /* DROPDOWN GENÉRICO */
  .dd-wrap { position:relative; display:inline-block; }
  .dd-menu { display:none; position:absolute; top:calc(100% + 4px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:500; min-width:140px; padding:0.3rem; white-space:nowrap; }
  .dd-menu.open { display:block; }
  .dd-opt { font-size:0.73rem; padding:0.3rem 0.55rem; border-radius:5px; cursor:pointer; color:var(--text); }
  .dd-opt:hover { background:var(--surface2); }
  .dd-opt.sel { background:var(--text); color:white; }

  /* FALTAS PANEL */
  .faltas-panel { display:none; position:absolute; top:calc(100% + 4px); right:0; background:var(--surface); border:1px solid var(--border); border-radius:9px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:500; padding:0.7rem 0.85rem; min-width:170px; }
  .faltas-panel.open { display:block; }
  .faltas-panel-title { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:0.45rem; }
  .faltas-row { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; margin-bottom:0.35rem; font-size:0.73rem; color:var(--text-muted); }
  .faltas-num { width:42px; border:1px solid var(--border); border-radius:5px; padding:0.2rem 0.3rem; font-size:0.78rem; text-align:center; font-family:'DM Sans',sans-serif; background:var(--surface2); outline:none; -moz-appearance:textfield; }
  .faltas-num::-webkit-outer-spin-button,.faltas-num::-webkit-inner-spin-button { -webkit-appearance:none; }
  .btn-faltas-ok { width:100%; margin-top:0.3rem; padding:0.32rem; border-radius:6px; border:none; background:var(--text); color:white; font-size:0.72rem; font-family:'DM Sans',sans-serif; cursor:pointer; }

  /* CONDICIONES */
  .cond-panel { display:none; background:var(--surface2); border-radius:8px; padding:0.6rem 0.75rem; margin:0.3rem 0 0.4rem; border:1px solid var(--border); }
  .cond-panel.open { display:block; }
  .cond-title { font-size:0.64rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:0.35rem; }
  .cond-lista { list-style:none; }
  .cond-item { display:flex; align-items:flex-start; gap:0.35rem; font-size:0.74rem; padding:0.18rem 0; border-bottom:1px solid var(--border); }
  .cond-item:last-child { border-bottom:none; }
  .cond-item .ci-check { color:var(--success); font-size:0.68rem; flex-shrink:0; margin-top:2px; }
  .cond-item .ci-txt { flex:1; line-height:1.4; }
  .btn-del-cond { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:0.7rem; }
  .btn-del-cond:hover { color:var(--danger); }
  .add-cond-row { display:flex; gap:0.28rem; margin-top:0.38rem; }
  .add-cond-inp { flex:1; border:1px solid var(--border); border-radius:5px; padding:0.26rem 0.45rem; font-size:0.71rem; font-family:'DM Sans',sans-serif; background:white; outline:none; color:var(--text); }
  .add-cond-inp:focus { border-color:var(--med-border); }
  .btn-add-cond { background:white; border:1px solid var(--border); border-radius:5px; padding:0.26rem 0.5rem; font-size:0.72rem; cursor:pointer; color:var(--text-muted); }

  /* TIMELINE */
  .timeline-wrap { margin-bottom:0.65rem; }
  .timeline-dates { display:flex; justify-content:space-between; font-size:0.59rem; color:var(--text-muted); margin-bottom:0.28rem; }
  .timeline-track { position:relative; height:5px; background:var(--track); border-radius:10px; overflow:visible; }
  .timeline-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,#94a3b8,#64748b); }
  .timeline-dot { position:absolute; top:50%; transform:translateY(-50%); width:8px; height:8px; border-radius:50%; border:1.5px solid white; }
  .dot-today { background:#3b82f6; z-index:2; }
  .dot-parcial { background:#ef4444; z-index:3; }
  .timeline-labels { position:relative; height:14px; margin-top:2px; }
  .parcial-label { position:absolute; top:0; font-size:0.54rem; color:#ef4444; font-weight:600; transform:translateX(-50%); white-space:nowrap; }

  /* EXAMEN */
  .examen-row { display:flex; align-items:center; justify-content:space-between; }
  .examen-info { font-size:0.72rem; color:var(--text-muted); }
  .examen-info strong { color:var(--text); }
  .dias-chip { font-size:0.68rem; font-weight:700; padding:0.2rem 0.55rem; border-radius:7px; }
  .dias-urgente { background:var(--danger-light); color:var(--danger); }
  .dias-pronto { background:var(--warning-light); color:var(--warning); }
  .dias-ok { background:var(--success-light); color:var(--success); }
  .dias-sin-fecha { background:var(--surface2); color:var(--text-muted); }

  /* BOTONES CARD */
  .card-btns { display:flex; gap:0.35rem; padding:0.55rem 1rem; border-top:1px solid var(--surface2); flex-wrap:wrap; }
  .btn-card { font-family:'DM Sans',sans-serif; font-size:0.68rem; font-weight:500; padding:0.28rem 0.65rem; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; text-decoration:none; transition:all 0.13s; display:inline-flex; align-items:center; gap:0.25rem; }
  .btn-card:hover { background:var(--surface2); color:var(--text); }

  /* PENDIENTES */
  .pendientes-panel { display:none; border-top:1px solid var(--surface2); padding:0.65rem 1rem; }
  .pendientes-panel.open { display:block; }
  .section-label { font-size:0.67rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.4rem; display:flex; align-items:center; justify-content:space-between; }
  .pendientes-lista { list-style:none; }
  .pendiente-item { display:flex; align-items:center; gap:0.5rem; padding:0.3rem 0; border-bottom:1px solid var(--surface2); font-size:0.78rem; }
  .pendiente-item:last-child { border-bottom:none; }
  .pendiente-item input[type="checkbox"] { width:13px; height:13px; accent-color:var(--med-color); cursor:pointer; flex-shrink:0; }
  .pendiente-item label { cursor:pointer; flex:1; line-height:1.3; }
  .pendiente-item.done label { text-decoration:line-through; color:var(--text-muted); }
  .btn-del { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:0.75rem; }
  .add-pendiente { display:flex; gap:0.35rem; margin-top:0.4rem; }
  .add-pendiente input { flex:1; border:1px solid var(--border); border-radius:6px; padding:0.28rem 0.5rem; font-size:0.74rem; font-family:'DM Sans',sans-serif; background:var(--surface2); outline:none; color:var(--text); }
  .add-pendiente input:focus { border-color:var(--med-border); }
  .btn-add { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:0.28rem 0.55rem; font-size:0.75rem; cursor:pointer; color:var(--text-muted); }

  /* BOTÓN AGREGAR MATERIA */
  .btn-add-materia-card { background:var(--surface); border:2px dashed var(--border); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.45rem; cursor:pointer; color:var(--text-muted); font-family:'DM Sans',sans-serif; transition:all 0.15s; min-height:180px; width:100%; }
  .btn-add-materia-card:hover { border-color:var(--text-muted); color:var(--text); background:var(--surface2); }
  .btn-add-materia-card .ic { font-size:1.6rem; }
  .btn-add-materia-card .lbl { font-size:0.75rem; font-weight:600; }

  /* FINALES */
  .finales-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .finales-header { padding:0.8rem 1.25rem; border-bottom:1px solid var(--border); position:relative; display:flex; align-items:center; justify-content:space-between; }
  .finales-title { font-family:'Montserrat',sans-serif; font-size:0.92rem; font-weight:700; }
  .finales-subtitle { font-size:0.72rem; color:var(--text-muted); }
  .btn-agregar-final { font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500; padding:0.32rem 0.8rem; border-radius:7px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
  .btn-agregar-final:hover { background:var(--surface2); color:var(--text); }
  .finales-empty { padding:1.5rem; text-align:center; color:var(--text-muted); font-size:0.8rem; }
  .final-row { display:grid; grid-template-columns:2fr 0.7fr 1fr 0.5fr 0.7fr auto; align-items:center; gap:0.75rem; padding:0.65rem 1.25rem; border-bottom:1px solid var(--surface2); font-size:0.78rem; transition:background 0.13s; }
  .final-row:last-child { border-bottom:none; }
  .final-row:hover { background:var(--surface2); }
  .final-nombre { font-weight:600; font-size:0.8rem; }
  .final-carrera { font-size:0.68rem; color:var(--text-muted); }
  .modalidad-chip { font-size:0.64rem; font-weight:600; padding:0.16rem 0.48rem; border-radius:7px; display:inline-block; }
  .libre { background:#fff3cd; color:#856404; }
  .regular-m { background:var(--success-light); color:var(--success); border-color:#6ee7b7; }
  .regular { background:var(--success-light); color:var(--success); }
  .revalida { background:var(--promo-light); color:var(--promo); }
  .btn-final-detail { background:none; border:1px solid var(--border); border-radius:6px; padding:0.22rem 0.55rem; font-size:0.7rem; cursor:pointer; color:var(--text-muted); font-family:'DM Sans',sans-serif; }
  .btn-final-detail:hover { background:var(--surface2); }
  /* MESAS */
  .mesa-chip { font-size:0.68rem; font-weight:600; padding:0.28rem 0.65rem; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text-muted); cursor:pointer; transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:0.05rem; }
  .mesa-chip:hover { border-color:var(--med-color); color:var(--med-color); background:var(--med-bg); }
  .mesa-chip.proxima { border-color:var(--med-color); color:var(--med-color); background:var(--med-bg); }
  .mesa-chip.pasada { opacity:0.45; }
  .mesa-dias { font-size:0.58rem; font-weight:400; color:inherit; }

  /* MODALES */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.32); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:14px; padding:1.4rem; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
  .modal h3 { font-family:'Montserrat',sans-serif; font-size:1rem; font-weight:700; margin-bottom:1rem; }
  .form-group { margin-bottom:0.8rem; }
  .form-group label { display:block; font-size:0.7rem; font-weight:600; color:var(--text-muted); margin-bottom:0.28rem; text-transform:uppercase; letter-spacing:0.05em; }
  .form-group input,.form-group select,.form-group textarea { width:100%; border:1px solid var(--border); border-radius:7px; padding:0.52rem 0.75rem; font-size:0.82rem; font-family:'DM Sans',sans-serif; background:var(--surface2); color:var(--text); outline:none; }
  .form-group input:focus,.form-group select:focus { border-color:var(--med-border); background:var(--surface); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
  .modal-actions { display:flex; gap:0.45rem; justify-content:flex-end; margin-top:1rem; flex-wrap:wrap; }
  .btn-cancel { padding:0.45rem 1rem; border-radius:7px; border:1px solid var(--border); background:var(--surface); font-family:'DM Sans',sans-serif; font-size:0.8rem; cursor:pointer; color:var(--text-muted); }
  .btn-save { padding:0.45rem 1rem; border-radius:7px; border:none; background:var(--text); color:white; font-family:'DM Sans',sans-serif; font-size:0.8rem; font-weight:500; cursor:pointer; }
  .btn-save:hover { opacity:0.85; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:0.9rem; }
  .detail-item label { font-size:0.66rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); display:block; margin-bottom:0.12rem; }
  .detail-item span { font-size:0.83rem; font-weight:500; }
  .unidades-lista { list-style:none; }
  .unidad-item { padding:0.45rem 0.6rem; background:var(--surface2); border-radius:7px; margin-bottom:0.3rem; font-size:0.78rem; display:flex; align-items:center; gap:0.4rem; }
  .unidad-num { font-size:0.62rem; font-weight:700; background:var(--border); color:var(--text-muted); width:19px; height:19px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* NOTAS */
  .notas-panel { display:none; border-top:1px solid var(--surface2); padding:0.65rem 1rem; }
  .notas-panel.open { display:block; }
  .nota-item { display:flex; align-items:center; gap:0.5rem; padding:0.32rem 0; border-bottom:1px solid var(--surface2); font-size:0.77rem; }
  .nota-item:last-child { border-bottom:none; }
  .nota-parcial { flex:1; font-weight:500; }
  .nota-num { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.9rem; min-width:28px; text-align:center; }
  .nota-aprobada { color:var(--success); }
  .nota-desaprobada { color:var(--danger); }
  .nota-estado { font-size:0.65rem; font-weight:600; padding:0.15rem 0.42rem; border-radius:5px; }
  .nota-estado.ok { background:var(--success-light); color:var(--success); }
  .nota-estado.fail { background:var(--danger-light); color:var(--danger); }
  .nota-fecha { font-size:0.68rem; color:var(--text-muted); }
  .btn-del-nota { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:0.72rem; }
  .add-nota-row { display:flex; gap:0.28rem; margin-top:0.45rem; flex-wrap:wrap; align-items:center; }
  .nota-inp { border:1px solid var(--border); border-radius:5px; padding:0.26rem 0.45rem; font-size:0.72rem; font-family:'DM Sans',sans-serif; background:var(--surface2); outline:none; color:var(--text); }
  .nota-inp:focus { border-color:var(--med-border); }
  .nota-inp.w-name { flex:1; min-width:80px; }
  .nota-inp.w-num { width:46px; text-align:center; }
  .nota-inp.w-date { width:100px; }
  .btn-add-nota { background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:0.26rem 0.55rem; font-size:0.72rem; cursor:pointer; color:var(--text-muted); white-space:nowrap; }
  .btn-add-nota:hover { background:var(--surface2); }

  /* ── BARRA PARCIALES ── */
  .parciales-barra { margin-bottom:1.1rem; }
  .parciales-barra-label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:0.5rem; }
  .parciales-scroll { display:flex; gap:0.4rem; align-items:center; overflow-x:auto; padding-bottom:0.3rem; scrollbar-width:none; }
  .parciales-scroll::-webkit-scrollbar { display:none; }
  .parc-chip { display:flex; flex-direction:column; gap:0.1rem; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0.45rem 0.7rem; flex-shrink:0; min-width:110px; transition:box-shadow 0.13s; cursor:default; }
  .parc-chip:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .parc-chip.urgente { border-color:#fca5a5; background:#fff5f5; }
  .parc-chip.pronto  { border-color:#fcd34d; background:#fffbeb; }
  .parc-chip.ok      { border-color:var(--border); }
  .parc-nombre { font-size:0.7rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
  .parc-materia { font-size:0.6rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .parc-fecha-row { display:flex; align-items:center; gap:0.3rem; margin-top:0.1rem; }
  .parc-fecha { font-size:0.62rem; color:var(--text-muted); }
  .parc-dias { font-size:0.65rem; font-weight:700; padding:0.1rem 0.35rem; border-radius:5px; }
  .parc-dias.urgente { background:var(--danger-light); color:var(--danger); }
  .parc-dias.pronto  { background:var(--warning-light); color:var(--warning); }
  .parc-dias.ok      { background:var(--success-light); color:var(--success); }
  .parc-sep { font-size:0.75rem; color:#fbbf24; flex-shrink:0; font-weight:700; align-self:center; }
  .parc-empty { font-size:0.75rem; color:var(--text-muted); font-style:italic; padding:0.3rem 0; }

  @media(max-width:1024px) { .materias-grid { grid-template-columns:repeat(2,1fr); } }

    /* HEADER */

<script src="data.js"></script>
<script>
// ── CONSTANTES ──
const INICIO_CUATRI = new Date(2026,3,1);
const FIN_CUATRI    = new Date(2026,6,17);
const hoy = new Date();
document.getElementById('fecha-hoy').textContent = hoy.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

// ── UTILS ──
function diasRestantes(s) {
  if (!s) return null;
  const [d,m,y]=s.split('/');
  return Math.ceil((new Date(y,m-1,d)-hoy)/86400000);
}
function chipDias(d) {
  if (d===null) return `<span class="dias-chip dias-sin-fecha">Sin fecha</span>`;
  if (d<0)  return `<span class="dias-chip dias-urgente">Venció</span>`;
  if (d===0)return `<span class="dias-chip dias-urgente">¡Hoy!</span>`;
  if (d<=7) return `<span class="dias-chip dias-urgente">${d}d</span>`;
  if (d<=21)return `<span class="dias-chip dias-pronto">${d}d</span>`;
  return `<span class="dias-chip dias-ok">${d}d</span>`;
}
function pct(f) {
  const total=FIN_CUATRI-INICIO_CUATRI;
  return ((Math.min(Math.max(f-INICIO_CUATRI,0),total)/total)*100).toFixed(2);
}
function slugify(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

// ── STORAGE HELPERS ──
function ls(k) { try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;} }
function lsSet(k,v) { localStorage.setItem(k,JSON.stringify(v)); }

// ── OVERRIDES POR MATERIA (año, cuatri, faltas editados desde app) ──
function getOv(id) { return ls('ov_'+id)||{}; }
function setOv(id,data) { lsSet('ov_'+id,data); }

// ── MATERIAS CUSTOM ──
function getCustom() { return ls('materias_custom')||[]; }
function setCustom(l) { lsSet('materias_custom',l); }

// ── CONDICIONES EXTRA ──
function getCondExtra(id) { return ls('cond_extra_'+id)||[]; }
function setCondExtra(id,l) { lsSet('cond_extra_'+id,l); }

// ── PROGRAMA ──
function getProgUrl(id) { return localStorage.getItem('prog_url_'+id)||''; }
function setProgUrl(id,url) { localStorage.setItem('prog_url_'+id,url); }

// ── PENDIENTES ──
function getPend(id) { return ls('pend_'+id)||[]; }
function setPend(id,l) { lsSet('pend_'+id,l); }

// ── MERGE: base + overrides ──
function getMateriaOcultas(){ return ls('materias_ocultas')||[]; }

function eliminarMateriaCursada(id){
  if(!confirm('¿Quitar esta materia del inicio? Sus datos quedan guardados pero la tarjeta desaparece.')) return;
  const custom = getCustom();
  if(custom.some(x=>x.id===id)){
    setCustom(custom.filter(x=>x.id!==id));
  } else {
    const ocultas = getMateriaOcultas();
    if(!ocultas.includes(id)){ ocultas.push(id); lsSet('materias_ocultas',ocultas); }
  }
  renderMaterias();
}

function getAllMaterias() {
  const ocultas = getMateriaOcultas();
  const base = MATERIAS.filter(m=>!ocultas.includes(m.id)).map(m => {
    const ov = getOv(m.id);
    return {
      ...m,
      año:        ov.año        || m.año,
      cuatrimestre: ov.cuatrimestre || m.cuatrimestre,
      tipo:       ov.tipo       || m.tipo,
      faltas:     ov.faltas     || m.faltas || {actuales:0,maximo:3},
    };
  });
  return [...base, ...getCustom()];
}

// ── TIMELINE ──
function buildTimeline(parciales) {
  const prog=pct(hoy);
  const dots=(parciales||[]).map(p=>{
    if(!p.fecha) return '';
    const [d,m,y]=p.fecha.split('/'); const f=new Date(y,m-1,d); const pos=pct(f);
    if(pos<0||pos>100) return '';
    return `<div class="timeline-dot dot-parcial" style="left:${pos}%" title="${p.nombre}: ${p.fecha}"></div>`;
  }).join('');
  const labs=(parciales||[]).map(p=>{
    if(!p.fecha) return '';
    const [d,m,y]=p.fecha.split('/'); const f=new Date(y,m-1,d); const pos=pct(f);
    if(pos<0||pos>100) return '';
    return `<span class="parcial-label" style="left:${pos}%">${p.nombre}</span>`;
  }).join('');
  return `<div class="timeline-wrap">
    <div class="timeline-dates"><span>1 abr</span><span>17 jul</span></div>
    <div class="timeline-track">
      <div class="timeline-fill" style="width:${prog}%"></div>
      <div class="timeline-dot dot-today" style="left:${prog}%" title="Hoy"></div>
      ${dots}
    </div>
    <div class="timeline-labels">${labs}</div>
  </div>`;
}

// ── BUILD CARD ──
function buildCard(m) {
  const dias = diasRestantes(m.examen);
  const tipoCls = m.tipo==='promocional'?'tipo-promocional':'tipo-regular';
  const tipoLabel = m.tipo==='promocional'?'⭐ Promo':'Regular';
  const carreraCls = m.carrera==='Medicina'?'medicina':'nutricion';
  const chipCls = m.carrera==='Medicina'?'chip-medicina':'chip-nutricion';
  const pendCount = getPend(m.id).filter(p=>!p.done).length;
  const f = m.faltas||{actuales:0,maximo:3};
  const fCls = f.actuales>=f.maximo?'faltas-llena':f.actuales>=f.maximo-1?'faltas-riesgo':'faltas-ok';
  const progUrl = getProgUrl(m.id)||m.programa||'';
  const isCustom = getCustom().some(x=>x.id===m.id);
  const condBase = m.condiciones||[];
  const condExtra = getCondExtra(m.id);
  const todasCond = [...condBase,...condExtra];

  return `
  <div class="materia-card ${carreraCls}" id="card-${m.id}">
    <div class="card-top">
      <div class="card-title-row">
        <div class="materia-nombre">${m.nombre}</div>
        <div style="display:flex;align-items:center;gap:0.3rem">
          <span class="carrera-chip ${chipCls}">${m.carrera}</span>
          ${isCustom?`<button style="background:none;border:none;cursor:pointer;font-size:0.72rem;color:var(--text-muted);padding:0" onclick="abrirEditarMateria('${m.id}')" title="Editar">✎</button>`:''}
          <button onclick="eliminarMateriaCursada('${m.id}')" title="Quitar materia" style="background:none;border:none;cursor:pointer;font-size:0.72rem;color:var(--text-muted);padding:0;line-height:1;opacity:0.5" onmouseover="this.style.opacity='1';this.style.color='var(--danger)'" onmouseout="this.style.opacity='0.5';this.style.color='var(--text-muted)'">×</button>
        </div>
      </div>

      <div class="meta-row">
        <!-- TIPO → condiciones -->
        <span class="tipo-chip ${tipoCls}" onclick="toggleCond('${m.id}')" title="Ver condiciones">${tipoLabel} ▾</span>

        <!-- CUATRIMESTRE dropdown -->
        <div class="dd-wrap">
          <span class="cuatri-chip" onclick="toggleDD('dd-cuatri-${m.id}')">${m.cuatrimestre.replace('° cuatrimestre','° cuatri')} ▾</span>
          <div class="dd-menu" id="dd-cuatri-${m.id}">
            ${['1° cuatri','2° cuatri','Anual'].map(v=>`
              <div class="dd-opt ${m.cuatrimestre===v||m.cuatrimestre===v.replace('cuatri','cuatrimestre')?'sel':''}" onclick="setOvField('${m.id}','cuatrimestre','${v}','dd-cuatri-${m.id}')">${v}</div>
            `).join('')}
          </div>
        </div>

        <!-- AÑO dropdown -->
        <div class="dd-wrap">
          <span class="cuatri-chip" onclick="toggleDD('dd-año-${m.id}')">${m.año} ▾</span>
          <div class="dd-menu" id="dd-año-${m.id}">
            ${['1° año','2° año','3° año','4° año','5° año'].map(v=>`
              <div class="dd-opt ${m.año===v?'sel':''}" onclick="setOvField('${m.id}','año','${v}','dd-año-${m.id}')">${v}</div>
            `).join('')}
          </div>
        </div>

        <!-- FALTAS -->
        <div class="dd-wrap" style="margin-left:auto">
          <span class="cuatri-chip faltas-chip ${fCls}" onclick="toggleDD('dd-faltas-${m.id}')">F ${f.actuales}/${f.maximo} ▾</span>
          <div class="dd-menu faltas-panel" id="dd-faltas-${m.id}" style="right:0;left:auto;min-width:170px">
            <div class="faltas-panel-title">Editar faltas</div>
            <div class="faltas-row"><span>Actuales:</span><input type="number" class="faltas-num" id="fi-act-${m.id}" value="${f.actuales}" min="0" max="20" onclick="event.stopPropagation()"></div>
            <div class="faltas-row"><span>Máximo:</span><input type="number" class="faltas-num" id="fi-max-${m.id}" value="${f.maximo}" min="1" max="20" onclick="event.stopPropagation()"></div>
            <button class="btn-faltas-ok" onclick="event.stopPropagation();guardarFaltas('${m.id}')">Guardar</button>
          </div>
        </div>
      </div>

      <!-- CONDICIONES -->
      <div class="cond-panel" id="cond-${m.id}">
        <div class="cond-title">Condiciones de ${m.tipo==='promocional'?'promoción':'regularidad'}</div>
        <ul class="cond-lista">
          ${condExtra.map((c,i)=>`
            <li class="cond-item">
              <span class="ci-check">✓</span>
              <span class="ci-txt">${c}</span>
              <button class="btn-del-cond" onclick="borrarCond('${m.id}',${i})">×</button>
            </li>`).join('')||'<li style="font-size:0.74rem;color:var(--text-muted);padding:0.2rem 0">Sin condiciones. Agregá las tuyas abajo.</li>'}
        </ul>
        <div class="add-cond-row">
          <input class="add-cond-inp" id="cond-inp-${m.id}" placeholder="Agregar condición..." onkeydown="if(event.key==='Enter')agregarCond('${m.id}')">
          <button class="btn-add-cond" onclick="agregarCond('${m.id}')">+</button>
        </div>
      </div>

      ${buildTimeline(getTodasParciales(m))}

      <div class="examen-row">
        ${(()=>{
          const prox = getProximoParcial(m);
          const fecha = prox?.fecha || m.examen || '';
          const dias = diasRestantes(fecha);
          const label = prox ? prox.nombre : 'Examen';
          return `<span class="examen-info">${label}: <strong>${fecha||'Sin fecha'}</strong></span>${chipDias(dias)}`;
        })()}
      </div>
    </div>

    <div class="card-btns">
      ${progUrl
        ?`<button class="btn-card" onclick="abrirPrograma('${m.id}')">📋 Programa</button>`
        :`<span class="btn-card" style="opacity:0.4;cursor:default">📋 Sin programa</span>`}
      <a href="temario.html?materia=${m.id}" class="btn-card">📝 Temario</a>
      <button class="btn-card" onclick="abrirModalParciales('${m.id}')">📅 Parciales</button>
      <button class="btn-card" onclick="togglePendPanel('${m.id}')">
        ✅ Pendientes${pendCount>0?` <span style="background:#ef4444;color:white;border-radius:10px;padding:0 5px;font-size:0.6rem">${pendCount}</span>`:''}
      </button>
      <button class="btn-card" onclick="toggleNotasPanel('${m.id}')">📊 Notas</button>
    </div>

    <div class="pendientes-panel" id="pend-${m.id}">
      ${buildPendPanel(m.id)}
    </div>

    <div class="notas-panel" id="notas-${m.id}">
      ${buildNotasPanel(m.id)}
    </div>
  </div>`;
}

// ── ADD MATERIA BUTTON CARD ──
function buildAddCard() {
  return `<button class="btn-add-materia-card" onclick="abrirModalMateria()">
    <span class="ic">＋</span>
    <span class="lbl">Agregar materia</span>
  </button>`;
}

// ── RENDER GRID ──
function renderMaterias() {
  const grid = document.getElementById('materias-grid');
  grid.innerHTML = '';
  const todas = getAllMaterias().sort((a,b)=>{

  todas.forEach(m => grid.insertAdjacentHTML('beforeend', `<div>${buildCard(m)}</div>`));

}

  const base = m.parciales||[];

function getProximoParcial(m) {
  const todos = getTodasParciales(m);

function asignarMesaAFinal(fecha) {

function getFinales(){return ls('finales')||[];}
function setFinales(l){
  // Ordenar por fecha de examen: sin fecha al final, con fecha de más próxima a más lejana
  l.sort((a,b)=>{
    if(!a.fecha&&!b.fecha) return 0;
    if(!a.fecha) return 1;
    if(!b.fecha) return -1;
    const pa=a.fecha.split('/'),pb=b.fecha.split('/');
    const da=new Date(+pa[2],+pa[1]-1,+pa[0]);
    const db=new Date(+pb[2],+pb[1]-1,+pb[0]);
    return da-db;
  });
  lsSet('finales',l);
}

function aprobarFinal(idx){
  const lista=getFinales();
  const f=lista[idx];
  if(!f.nota){alert('Cargá la nota antes de aprobar');return;}
  // Actualizar Plan
  const planData=JSON.parse(localStorage.getItem('plan_mat_'+f.planId)||'{}');
  planData.estado='aprobada';
  planData.nota=parseFloat(f.nota);
  planData.modalidad=f.modalidad;
  if(f.fecha) planData.fecha=f.fecha;
  localStorage.setItem('plan_mat_'+f.planId, JSON.stringify(planData));
  // Guardar en historial con fecha de aprobación y temario
  const temas = JSON.parse(localStorage.getItem('final_unidades_'+f.planId)||'[]');
  const jsonRepaso = localStorage.getItem('final_repaso_json_'+f.planId)||'';
  const hist = getHistorial();
  hist.unshift({
    ...f,
    fechaAprobacion: new Date().toLocaleDateString('es-AR'),
    temas,
    jsonRepaso
  });
  setHistorial(hist);
  // Quitar de activos
  lista.splice(idx,1);
  setFinales(lista);
  renderFinales();
}

          <div style="display:flex;gap:0.4rem;align-items:center">
            <span class="modalidad-chip ${modalCls}">${modalLabel}</span>
            <span style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1rem;color:var(--success)">${f.nota}</span>
          </div>
        </div>
        <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem">${temasCount} temas · ${aprendidos} aprendidos · Fecha examen: ${f.fecha||'—'}</div>
        <div style="display:flex;gap:0.4rem">
          <button onclick="restaurarFinal(${i})" style="font-size:0.72rem;padding:0.25rem 0.7rem;border-radius:6px;border:1px solid var(--border);background:white;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-muted)">↩ Restaurar a lista</button>

        </div>
      </div>`;
    }).join('');
  }
  modal.classList.add('open');
}

function restaurarFinal(i){
  const hist=getHistorial();
  const f=hist[i];
  const lista=getFinales();
  if(lista.find(x=>x.planId===f.planId)){alert('Ya está en la lista activa');return;}
  // Restaurar temario
  if(f.temas?.length) localStorage.setItem('final_unidades_'+f.planId, JSON.stringify(f.temas));
  if(f.jsonRepaso) localStorage.setItem('final_repaso_json_'+f.planId, f.jsonRepaso);
  // Quitar marca de aprobado en plan
  const planData=JSON.parse(localStorage.getItem('plan_mat_'+f.planId)||'{}');
  planData.estado='pendiente';
  localStorage.setItem('plan_mat_'+f.planId, JSON.stringify(planData));
  // Agregar a lista activa
  lista.push({planId:f.planId,nombre:f.nombre,carrera:f.carrera,modalidad:f.modalidad,fecha:f.fecha,nota:f.nota});
  setFinales(lista);
  hist.splice(i,1); setHistorial(hist);
  cerrarModal('modal-historial');
  renderFinales();
}

function borrarHistorial(i){
  if(!confirm('¿Eliminar este registro del historial? No se puede deshacer.'))return;
  const hist=getHistorial(); hist.splice(i,1); setHistorial(hist);
  abrirHistorial();
}

function editarNotaFinal(idx, val){ const l=getFinales(); l[idx].nota=val; setFinales(l); }
function editarFechaFinal(idx, val){
  const l=getFinales();
  if(val){const[y,m,d]=val.split('-');l[idx].fecha=`${d}/${m}/${y}`;}
  setFinales(l);
}
function editarModalidadFinal(idx, val){ const l=getFinales(); l[idx].modalidad=val; setFinales(l); }
function eliminarFinal(idx){
  if(!confirm('¿Eliminar este final?'))return;
  const l=getFinales(); l.splice(idx,1); setFinales(l); renderFinales();
}

function getMesaLabel(fecha){
  if(!fecha) return null;
  const mesa = MESAS_2026.find(m=>m.fecha===fecha);
  return mesa ? mesa.label : null;
}

function renderFinales(){
  const lista=getFinales();
  const container=document.getElementById('finales-container');
  if(!lista.length){
    container.innerHTML='<div class="finales-empty">No tenés finales cargados todavía. Agregá uno con el botón +</div>';
    return;
  }
  container.innerHTML=lista.map((f,i)=>{
    const d=f.fecha?diasRestantes(f.fecha):null;
    const mesaLabel=getMesaLabel(f.fecha);
    const modalCls=f.modalidad==='libre'?'libre':f.modalidad==='revalida'?'revalida':'regular-m';
    let fechaInput='';
    if(f.fecha){const[dd,mm,yy]=f.fecha.split('/');fechaInput=`${yy}-${mm}-${dd}`;}
    return `<div class="final-row">
      <div>
        <div class="final-nombre">${f.nombre}</div>
        <div class="final-carrera">${f.carrera}</div>
      </div>
      <select class="modalidad-chip ${modalCls}" onchange="editarModalidadFinal(${i},this.value)" style="border:1px solid var(--border);border-radius:6px;font-size:0.7rem;padding:0.15rem 0.3rem;cursor:pointer">
        <option value="regular-m" ${f.modalidad==='regular-m'?'selected':''}>Regular</option>
        <option value="libre" ${f.modalidad==='libre'?'selected':''}>Libre</option>
        <option value="revalida" ${f.modalidad==='revalida'?'selected':''}>Reválida</option>
      </select>
      <input type="date" value="${fechaInput}" onchange="editarFechaFinal(${i},this.value)"
        style="border:1px solid var(--border);border-radius:6px;font-size:0.72rem;padding:0.15rem 0.35rem;font-family:'DM Sans',sans-serif;background:var(--surface2);outline:none">
      <input type="number" value="${f.nota||''}" min="1" max="10" step="0.5" placeholder="Nota"
        onchange="editarNotaFinal(${i},this.value)"
        style="width:52px;border:1px solid var(--border);border-radius:6px;font-size:0.72rem;padding:0.15rem 0.35rem;text-align:center;font-family:'DM Sans',sans-serif;background:var(--surface2);outline:none">
      <div style="display:flex;flex-direction:column;align-items:flex-start;gap:0.1rem">
        ${mesaLabel?`<span style="font-size:0.65rem;font-weight:600;color:var(--med-color)">Mesa ${mesaLabel}</span>`:''}
        ${d!==null?chipDias(d):''}
      </div>
      <div style="display:flex;gap:0.35rem;align-items:center">
        <a href="final.html?id=${f.planId}" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.55rem;font-size:0.72rem;cursor:pointer;color:var(--text-muted);text-decoration:none;font-family:'DM Sans',sans-serif" title="Ver temario del final">📝 →</a>
        <button style="background:var(--success);color:white;border:none;border-radius:6px;padding:0.25rem 0.6rem;font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif" onclick="aprobarFinal(${i})">✓ Aprobé</button>
        <button style="background:none;border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.5rem;font-size:0.72rem;cursor:pointer;color:var(--danger)" onclick="eliminarFinal(${i})">×</button>
      </div>
    </div>`;
  }).join('');
}

// ── EXPORT / IMPORT ──
function exportarDatos(){
  const datos = {};
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    datos[key] = localStorage.getItem(key);
  }
  const json = JSON.stringify(datos, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toLocaleDateString('es-AR').replace(/\//g,'-');
  a.href = url;
  a.download = `nexu-backup-${fecha}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importarDatos(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const datos = JSON.parse(e.target.result);
      if(!confirm(`¿Importar backup? Esto va a reemplazar todos tus datos actuales con los del archivo "${file.name}".\n\n¿Estás segura?`)) return;
      // Limpiar localStorage actual
      localStorage.clear();
      // Cargar datos del backup
      Object.entries(datos).forEach(([k,v]) => localStorage.setItem(k,v));
      alert('✅ Datos importados correctamente. La app se va a recargar.');
      location.reload();
    } catch(err) {
      alert('❌ El archivo no es válido. Asegurate de que sea un backup de Nexu.');
    }
  };
  reader.readAsText(file);
  input.value='';
}

(function migrarFinalesViejos(){
  const lista = getFinales();
  let cambio = false;
  lista.forEach((f,i)=>{
    if(!f.planId && f.nombre){
      // Buscar match por nombre en el plan
      const match = TODAS_MATERIAS_PLAN.find(m=>
        m.nombre.toLowerCase().includes(f.nombre.toLowerCase().slice(0,6)) ||
        f.nombre.toLowerCase().includes(m.nombre.toLowerCase().slice(0,6))
      );
      if(match){ lista[i].planId = match.id; cambio=true; }
    }
  });
  if(cambio) setFinales(lista);
})();

// ── BARRA DE PARCIALES ──
function renderParciales() {
  const container = document.getElementById('parciales-barra');
  if (!container) return;

  const ocultas = getMateriaOcultas();
  const todasMaterias = [...(MATERIAS||[]), ...(getCustom()||[])].filter(m=>!ocultas.includes(m.id));
  const lista = [];

  todasMaterias.forEach(m => {
    const parcsBase = m.parciales || [];
    const parcsExtra = getParcialesExtra(m.id) || [];
    [...parcsBase, ...parcsExtra].forEach(p => {
      if (!p.fecha) return;
      const dr = diasRestantes(p.fecha);
      if (dr === null || dr < 0) return;
      lista.push({ nombre: p.nombre, materia: m.nombre, carrera: m.carrera, fecha: p.fecha, dr });
    });
  });

  lista.sort((a, b) => a.dr - b.dr);

  if (!lista.length) { container.innerHTML = ''; return; }

  const chipCls = (dr) => dr <= 7 ? 'urgente' : dr <= 21 ? 'pronto' : 'ok';
  const diasLabel = (dr) => dr === 0 ? 'hoy' : dr === 1 ? 'mañana' : `en ${dr}d`;

  let html = '<div class="parciales-barra-label">📅 Próximos parciales</div><div class="parciales-scroll">';

  lista.forEach((p, i) => {
    const cls = chipCls(p.dr);
    const sep = i < lista.length - 1 && (lista[i+1].dr - p.dr) <= 7
      ? '<div class="parc-sep" title="Parciales muy cercanos">⚡</div>' : '';
    html += `
      <div class="parc-chip ${cls}">
        <div class="parc-nombre" title="${p.nombre} · ${p.materia}">${p.nombre} · ${p.materia}</div>
        <div class="parc-fecha-row">
          <span class="parc-fecha">${p.fecha}</span>
          <span class="parc-dias ${cls}">${diasLabel(p.dr)}</span>
        </div>
      </div>${sep}`;
  });

  html += '</div>';
  container.innerHTML = html;
}
