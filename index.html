<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FP — Finanzas Personales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080e1a;--card:#111927;--card2:#172030;--border:#2a3f55;
  --text:#e2e8f0;--t2:#8899aa;--t3:#5a6f82;
  --teal:#4a7dff;--teal2:#3a6ae6;--coral:#ff5c7a;--gold:#ffd166;--blue:#5dadec;--purple:#b68eff;--pink:#ff8fab;
  --r:16px;--r2:12px;
}
body{background:#080e1a;background-image:radial-gradient(ellipse at 50% 0%,rgba(74,125,255,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(74,125,255,.04) 0%,transparent 50%);min-height:100vh;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.hdr{padding:24px 32px 20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.hdr-left h1{font-size:26px;font-weight:900;letter-spacing:-.5px}
.hdr-left p{font-size:13px;color:var(--t2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.month-badge{background:var(--teal);color:#0d1b2a;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700}
.toggle-grp{display:flex;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)}
.toggle-grp button{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t2);transition:all .2s}
.toggle-grp button.active{background:var(--card2);color:var(--text)}

/* LAYOUT */
.page{padding:0 32px 60px;max-width:1400px;margin:0 auto}
.row{display:grid;gap:16px;margin-bottom:20px}
.r4{grid-template-columns:repeat(4,1fr)}
.r2{grid-template-columns:3fr 2fr}
.r3{display:flex;gap:12px}
.r3>div{flex:1 1 0;overflow:hidden;min-width:0;width:0}
.r3 .card{padding:14px}
.r2eq{grid-template-columns:repeat(3,1fr)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;min-width:0}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--t2);margin-bottom:16px}

/* KPI */
.kpi-icon{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3)}
.kpi-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.ic-up{background:rgba(74,222,128,.08);color:#4ade80}
.ic-down{background:rgba(255,92,122,.08);color:#ff5c7a}
.ic-bal{background:rgba(93,173,236,.08);color:var(--blue)}
.ic-save{background:rgba(255,255,255,.05);color:var(--t2)}
.kpi-label{font-size:13px;color:var(--t2);font-weight:500}
.kpi-val{font-size:28px;font-weight:900;margin-top:6px;letter-spacing:-1px}
.kpi-change{font-size:12px;font-weight:600;margin-top:6px}
.kpi-up{color:var(--teal)}.kpi-down{color:var(--coral)}

/* CATEGORY BARS */
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,63,85,.4)}
.cat-row:last-child{border-bottom:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{width:80px;font-size:12px;font-weight:500;flex-shrink:0}
.cat-bar-wrap{flex:1;height:7px;background:rgba(42,63,85,.5);border-radius:4px;overflow:hidden}
.cat-bar{height:100%;border-radius:4px;transition:width .6s}
.cat-vals{text-align:right;min-width:90px;flex-shrink:0}
.cat-amt{font-size:13px;font-weight:700}
.cat-pct{font-size:11px;color:var(--t2);margin-left:8px}

/* CHART */
.chart-box{position:relative;height:180px}

/* INVESTMENTS */
.inv-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.risk-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.risk-low{background:rgba(45,212,168,.12);color:var(--teal);border:1px solid rgba(45,212,168,.25)}
.risk-mid{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid rgba(255,209,102,.25)}
.risk-high{background:rgba(255,107,138,.12);color:var(--coral);border:1px solid rgba(255,107,138,.25)}
.inv-amt{font-size:22px;font-weight:800;margin:10px 0 4px;letter-spacing:-.5px}
.REMOVED{font-size:12px;font-weight:600}

/* GOALS */
.goal-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.goal-icon{font-size:22px;margin-bottom:6px}
.goal-name{font-size:14px;font-weight:700}
.goal-nums{display:flex;justify-content:space-between;font-size:12px;margin:8px 0 4px;color:var(--t2)}
.prog-bg{height:6px;background:rgba(42,63,85,.6);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}
.goal-info{font-size:11px;color:var(--t2);margin-top:8px;line-height:1.5}

/* INCOME BARS */
.inc-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.inc-name{width:70px;font-size:12px;font-weight:500;flex-shrink:0}
.inc-bar-wrap{flex:1;min-width:0;height:8px;background:rgba(42,63,85,.5);border-radius:4px;overflow:hidden}
.inc-bar{height:100%;border-radius:4px;background:var(--teal)}
.inc-val{font-size:12px;font-weight:700;min-width:70px;text-align:right}

/* SECTION TITLE */
.sec{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* FAB */
.fab-row{position:fixed;bottom:20px;right:32px;display:flex;gap:8px;z-index:50}
.fab{border:none;border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .15s;background:var(--card2);color:var(--text);border:1px solid var(--border)}
.fab:active{transform:scale(.95)}
.fab:hover{border-color:var(--teal)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;backdrop-filter:blur(4px);overflow-y:auto}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;overflow-x:hidden}
.modal h2{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal .close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer}
.input{background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:var(--r2);padding:11px 14px;font-size:14px;width:100%;outline:none;font-family:inherit;font-weight:500}
.input:focus{border-color:var(--teal)}
.input::placeholder{color:var(--t3)}
.input[type="date"]::-webkit-calendar-picker-indicator{opacity:0;width:30px;height:30px;cursor:pointer;position:absolute;right:5px}
.input[type="date"]{color-scheme:dark}
.input[type="number"]::-webkit-inner-spin-button,.input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.input[type="number"]{-moz-appearance:textfield}
.date-wrap{position:relative}
.date-wrap::after{content:"\1F4C5";position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:14px;filter:grayscale(1) brightness(2)}
.form-stack{display:flex;flex-direction:column;gap:10px}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{border:none;border-radius:var(--r2);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-teal{background:var(--teal);color:#0d1b2a}
.btn-blue{background:var(--blue);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.toggle-row{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t2);transition:all .2s}
.tg-g{background:rgba(45,212,168,.1);color:var(--teal);border-color:rgba(45,212,168,.3)}
.tg-r{background:rgba(255,107,138,.1);color:var(--coral);border-color:rgba(255,107,138,.3)}
.mode-row{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:12px}
.mode-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:var(--t3)}
.mode-btn.active{background:var(--card2);color:var(--teal)}
.btn-icon{background:none;border:none;color:var(--t3);padding:4px 6px;cursor:pointer;font-size:11px;border-radius:6px;font-family:inherit;font-weight:500;letter-spacing:.5px}
.btn-icon:hover{color:var(--text);background:rgba(255,255,255,.05)}


.reg-grid{display:grid;grid-template-columns:2fr 3fr;gap:16px;align-items:start}
.reg-col{display:flex;flex-direction:column}
.reg-col h3{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.reg-table{width:100%;font-size:12px;border-collapse:collapse}
.reg-table th{text-align:left;font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:6px 6px;border-bottom:1px solid var(--border)}
.reg-table td{padding:7px 6px;border-bottom:1px solid rgba(42,63,85,.2);font-weight:500}
.reg-table tr:last-child td{border-bottom:none}
.reg-total{font-weight:700;border-top:2px solid var(--border)!important}
.reg-total td{border-bottom:none!important;padding-top:10px}
.reg-body{min-height:320px}
.reg-pag{display:flex;justify-content:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.reg-pag button{background:var(--bg);border:1px solid var(--border);color:var(--t2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}
.reg-pag button:hover{color:var(--text);border-color:var(--teal)}
.reg-pag span{font-size:11px;color:var(--t3);padding:4px 8px}

.cat-mgr{margin-top:20px}
.cat-mgr-title{font-size:13px;font-weight:700;margin-bottom:10px}
.cat-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,63,85,.2);font-size:12px}
.cat-item:last-child{border-bottom:none}
.cat-main{font-weight:600;min-width:120px}
.cat-subs{flex:1;color:var(--t2)}
.cat-add-row{display:flex;gap:6px;margin-top:8px}
.cat-add-row .input{flex:1;padding:7px 10px;font-size:12px}
.cat-add-btn{background:var(--card2);color:var(--teal);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}

.chk-row{transition:background .2s}
.chk-row.checked{background:rgba(45,212,168,.06)}
.chk-row td:first-child{padding-left:6px}
.chk{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;vertical-align:middle;-webkit-appearance:none;appearance:none;border:2px solid var(--border);border-radius:4px;background:transparent;position:relative}
.chk:checked{background:var(--teal);border-color:var(--teal)}
.chk:checked::after{content:"\2713";color:#0d1b2a;font-size:11px;font-weight:700;position:absolute;top:-1px;left:2px}
.pay-counter{position:sticky;bottom:0;background:var(--card);border-top:2px solid var(--border);padding:12px 16px;border-radius:0 0 var(--r) var(--r);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.pay-counter-item{font-size:12px;color:var(--t2)}
.pay-counter-item b{font-size:14px;display:block;margin-top:2px}
.act-cell{white-space:nowrap;text-align:right}
.var-pos{color:#4ade80}.var-neg{color:#ff5c7a}
.kpi-est{font-size:11px;color:var(--t3);margin-top:6px}
.kpi-est b{font-weight:700}
.kpi-var{font-size:12px;font-weight:700;margin-top:3px}
@media(max-width:700px){.reg-grid{grid-template-columns:1fr}}

.empty-msg{text-align:center;padding:30px;color:var(--t3);font-size:13px}
.sec-icon{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;margin-right:6px}
.sec-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.mov-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,63,85,.3);font-size:13px}
.mov-item:last-child{border-bottom:none}
.mov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mov-body{flex:1;min-width:0}
.mov-cat{font-weight:600}
.mov-sub{font-size:11px;color:var(--t3)}
.mov-amt{font-weight:700;font-size:13px;flex-shrink:0}
.mov-acts{display:flex;gap:2px;flex-shrink:0;margin-left:4px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--teal);color:#0d1b2a;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:900px){
  .r4{grid-template-columns:1fr 1fr}.r2,.r2eq{grid-template-columns:1fr}.r3{display:flex;flex-direction:column}
  .hdr{padding:16px}.page{padding:0 16px 80px}
  .cat-name{width:90px;font-size:12px}.cat-vals{min-width:100px}
  .kpi-val{font-size:22px}
  .fab-row{right:16px;bottom:16px}
}
@media(max-width:500px){.r4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<div class="hdr">
  <div class="hdr-left">
    <div style="display:flex;align-items:center;gap:12px"><h1 style="font-size:28px;font-weight:900;letter-spacing:1px;cursor:pointer" onclick="setPage('dash')">FP</h1><button id="eyeBtn" onclick="toggleHide()" style="background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:6px 8px;cursor:pointer;color:var(--t2);display:flex;align-items:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
  </div>
  <div class="hdr-right">
    <div class="toggle-grp">
      <button class="active" id="btnDash" onclick="setPage('dash')">Dashboard</button>
      <button id="btnReg" onclick="setPage('reg')">Registro</button>
    </div>
    <select id="selMo" class="sel" style="min-width:110px;background:#1b2838;color:#e2e8f0;border:1px solid #2a3f55;font-weight:600;border-radius:20px;padding:7px 16px;cursor:pointer;font-size:13px" onchange="setMo()"></select>
    <select id="selYr" class="sel" style="min-width:70px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-weight:600;cursor:pointer" onchange="setMo()">
      <option value="2025">2025</option><option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option>
    </select>
    <div id="monthBadge" style="display:none"></div>
  </div>
</div>

<div class="page" id="page"></div>

<div class="fab-row">
  <button class="fab" style="background:var(--teal);color:#fff;border:none" onclick="openModal('mov')">＋ Movimiento</button>
</div>

<script>
var MO=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var IS=["Mamá","Papá","Musa","Núcleo Sport","Nutrimed","C. Sandwich","Trading","Otros"];
var EC=[
  {n:"Vivienda y servicios",sc:["Alquiler","Luz","Agua","Gas","Internet"],cl:"#2dd4a8"},
  {n:"Mercadería",sc:["Básicos","Verdulería","Carnicería","Pollería","Dietética","Almacén"],cl:"#5dadec"},
  {n:"Transporte",sc:["Remis","Cole","Combustible"],cl:"#ffd166"},
  {n:"Ocio y salidas",sc:["Salidas","Regalos","Gastos hormiga"],cl:"#ff6b8a"},
  {n:"Salud",sc:["Médico","Gym","Medicación"],cl:"#b68eff"},
  {n:"Créditos",sc:["M. Crédito","Naranja","Cuotas"],cl:"#ff8fab"},
  {n:"Educación",sc:["Cursos","Fotocopias","Materiales"],cl:"#4ecdc4"},
  {n:"Estética",sc:["Uñas","Tattoo","Facial","Lifting"],cl:"#f7aef8"},
  {n:"Servicios",sc:["Spotify","Netflix","Apps"],cl:"#74c7ec"},
  {n:"Tecnología",sc:["Celular","Monitor","Cables"],cl:"#89b4fa"},
  {n:"Vestuario",sc:["Ropa","Accesorios","Calzados"],cl:"#fab387"},
  {n:"Inversión",sc:["Aportes"],cl:"#a6e3a1"},
  {n:"Impuestos",sc:["Monotributo"],cl:"#f9e2af"},
  {n:"Emprendimiento",sc:["Musa","Nutrimed","Insumos"],cl:"#cba6f7"},
  {n:"Ahorros",sc:["Reservas","Colchón"],cl:"#94e2d5"}
];
var INST=["Cedears","Acciones","Bonos","Ob. Negociables","FCI","Letras","Caución","Naranja X","MM","Trading","Plazo fijo"];
var RISKS=[{n:"Bajo riesgo",c:"risk-low"},{n:"Riesgo medio",c:"risk-mid"},{n:"Alto riesgo",c:"risk-high"}];
var GI={emergencia:"\u25C6",cirugia:"\u25C6",emprendimiento:"\u25C6",viaje:"\u25C6",tech:"\u25C6",auto:"\u25C6",educacion:"\u25C6",otro:"\u25C6"};

var S={
  txns:JSON.parse(localStorage.getItem("fp-txns")||"[]"),
  inv:JSON.parse(localStorage.getItem("fp-inv")||"[]"),
  goals:JSON.parse(localStorage.getItem("fp-goals")||"[]"),
  viewM:new Date().getMonth(),customCats:JSON.parse(localStorage.getItem("fp-cats")||"[]"),viewY:new Date().getFullYear(),pg:"dash",hidden:true
};

function setPage(p){S.pg=p;Q("btnDash").classList.toggle("active",p==="dash");Q("btnReg").classList.toggle("active",p==="reg");S.regPageI=0;S.regPageE=0;render()}
var CH={};
var now=new Date();

function fmt(n){n=Number(n);if(isNaN(n))n=0;if(S.hidden)return"$ *****";return"$ "+new Intl.NumberFormat("es-AR",{maximumFractionDigits:0}).format(n)}
function toggleHide(){S.hidden=!S.hidden;var icon=Q("eyeIcon");if(S.hidden){icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}else{icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}render();}
function fmtInput(v){var n=String(v).replace(/[^\d]/g,"");if(!n)return"";return new Intl.NumberFormat("es-AR",{maximumFractionDigits:0}).format(Number(n))}
function parseInput(v){return Number(String(v).replace(/[^\d]/g,""))||0}
function Q(id){return document.getElementById(id)}
function sv(){localStorage.setItem("fp-txns",JSON.stringify(S.txns));localStorage.setItem("fp-inv",JSON.stringify(S.inv));localStorage.setItem("fp-goals",JSON.stringify(S.goals));localStorage.setItem("fp-cats",JSON.stringify(S.customCats))}
function toast(m){var t=Q("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2200)}
function kc(){try{Object.values(CH).forEach(function(c){c.destroy()})}catch(e){}CH={}}
try{Chart.defaults.color="#5a6f82";Chart.defaults.font.family="Inter"}catch(e){}

function curM(){return{m:S.viewM,y:S.viewY}}
function setMo(){S.viewM=+Q("selMo").value;S.viewY=+Q("selYr").value;render()}
function initSelectors(){
  var sel=Q("selMo");sel.innerHTML="";
  MO.forEach(function(m,i){var o=document.createElement("option");o.value=i;o.textContent=m;sel.appendChild(o)});
  sel.value=S.viewM;Q("selYr").value=S.viewY;
}

function gmt(m,y){return S.txns.filter(function(t){return t.month===m&&t.year===y})}
function getAmounts(tx){
  var e=0,r=0;
  if(tx.estimated!==undefined&&tx.estimated!==null&&tx.estimated!=="")e=Number(tx.estimated);
  if(tx.realAmt!==undefined&&tx.realAmt!==null&&tx.realAmt!=="")r=Number(tx.realAmt);
  if(r===0&&tx.amount!==undefined)r=Number(tx.amount)||0;
  if(isNaN(e))e=0;if(isNaN(r))r=0;
  return{est:e,real:r};
}
function gsum(arr,tp){return arr.filter(function(x){return x.type===tp}).reduce(function(s,x){var a=getAmounts(x);return s+a.real},0)}
function gsumEst(arr,tp){return arr.filter(function(x){return x.type===tp}).reduce(function(s,x){var a=getAmounts(x);return s+a.est},0)}
function fixCatName(name){
  var ecNames=EC.map(function(e){return e.n});
  if(ecNames.indexOf(name)>-1)return name;
  var match=EC.find(function(e){return name.indexOf(e.n)>-1||e.n.indexOf(name)>-1});
  return match?match.n:name;
}
function ggrp(arr,tp){
  var m={};arr.filter(function(x){return x.type===tp}).forEach(function(x){var a=getAmounts(x);var cat=fixCatName(x.category);m[cat]=(m[cat]||0)+a.real});
  return Object.entries(m).map(function(e){return{name:e[0],value:e[1]}}).sort(function(a,b){return b.value-a.value});
}

function kpiCard(label,val,chg,iconCls,iconSvg,invertColor,est,accentColor,customVar){
  var isUp=invertColor?chg<0:chg>0;
  var arrow=chg>0?"\u2191":chg<0?"\u2193":"\u2192";
  var cls=isUp?"kpi-up":"kpi-down";
  if(chg===0) cls="";
  var estHtml="";
  if(est>0){
    if(customVar==="novar"){
      estHtml='<div class="kpi-est">Est: <b>'+fmt(est)+'</b></div>';
    }else{
      var v=val-est;var vc;
      if(invertColor){vc=v>0?"var-neg":"var-pos"}else{vc=v>=0?"var-pos":"var-neg"}
      estHtml='<div class="kpi-est">Est: <b>'+fmt(est)+'</b> \u00b7 <span class="'+vc+'" style="font-weight:700">'+(v>=0?"+":"")+fmt(v)+'</span></div>';
    }
  }
  return '<div class="card" style="border-top:3px solid '+(accentColor||'var(--border)')+'"><span class="kpi-icon '+iconCls+'">'+iconSvg+'</span><div class="kpi-label">'+label+'</div><div class="kpi-val">'+fmt(val)+'</div><div class="kpi-change '+cls+'">'+arrow+Math.abs(chg)+'% vs mes ant.</div>'+estHtml+'</div>';
}

function initCharts(c){
  if(typeof Chart==="undefined")return;
  try{
  var labels=[],dInc=[],dExp=[];
  for(var i=4;i>=0;i--){
    var m=c.m-i,y=c.y;while(m<0){m+=12;y--}
    var t=gmt(m,y);
    labels.push(MO[m].slice(0,3));
    dInc.push(gsum(t,"ingreso"));
    dExp.push(gsum(t,"egreso"));
  }
  var el=Q("chTrend");
  if(el){
    CH.tr=new Chart(el,{type:"bar",data:{labels:labels,datasets:[
      {label:"Ingresos",data:dInc,backgroundColor:"#2dd4a8",borderRadius:6,borderSkipped:false},
      {label:"Egresos",data:dExp,backgroundColor:"#ff6b8a",borderRadius:6,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,scales:{
      x:{ticks:{font:{size:12,weight:"600"}},grid:{display:false}},
      y:{ticks:{font:{size:11},callback:function(v){return(v/1000).toFixed(0)+"k"}},grid:{color:"rgba(42,63,85,.3)"}}
    },plugins:{legend:{labels:{font:{size:12},usePointStyle:true,pointStyle:"circle",padding:16}},
      tooltip:{backgroundColor:"#1b2838",titleFont:{family:"Inter",weight:"700"},bodyFont:{family:"Inter"},padding:14,cornerRadius:10,borderColor:"#2a3f55",borderWidth:1,callbacks:{label:function(c){return c.dataset.label+": "+fmt(c.raw)}}}
    }}});
  }
  // Category pie chart
  var catPieEl=Q("catPie");
  if(catPieEl){
    var pieD=ggrp(gmt(c.m,c.y),"egreso");
    var pieFiltered=pieD.filter(function(d){return d.value>0});
    var pieCols=pieFiltered.map(function(d){var ec=EC.find(function(e){return e.n===d.name});return ec?ec.cl:"#5dadec"});
    CH.catPie=new Chart(catPieEl,{type:"doughnut",data:{labels:pieFiltered.map(function(d){return d.name}),datasets:[{data:pieFiltered.map(function(d){return d.value}),backgroundColor:pieCols,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,cutout:"60%",plugins:{legend:{display:false},tooltip:{backgroundColor:"#1b2838",padding:12,cornerRadius:10,callbacks:{label:function(ctx){return ctx.label+": "+fmt(ctx.raw)}}}}}});
  }
  }catch(e){console.log("Charts unavailable")}
}

  modalType=type;editId=id||null;formData={};

function promptAddSub(catIdx){
  var name=prompt("Nueva subcategor\u00eda para "+EC[catIdx].n+":");
  if(!name)return;
  EC[catIdx].sc.push(name.trim());
  S.customCats=EC.map(function(c){return{n:c.n,sc:c.sc.slice(),cl:c.cl}});
  sv();toast("Subcategor\u00eda agregada");render();
}
function editCat(catIdx){
  var cat=EC[catIdx];
  var oldName=cat.n;
  var newName=prompt("Nombre de la categor\u00eda:",cat.n);
  if(!newName)return;
  var newSubs=prompt("Subcategor\u00edas (separar con coma):",cat.sc.join(", "));
  if(newSubs===null)return;
  EC[catIdx].n=newName.trim();
  EC[catIdx].sc=newSubs.split(",").map(function(s){return s.trim()}).filter(function(s){return s});
  if(oldName!==newName.trim()){
    S.txns=S.txns.map(function(t){return t.category===oldName?Object.assign({},t,{category:newName.trim()}):t});
  }
  S.customCats=EC.map(function(c){return{n:c.n,sc:c.sc.slice(),cl:c.cl}});
  sv();toast("Categor\u00eda editada");render();
}
function delCat(catIdx){
  if(!confirm("\u00bfEliminar "+EC[catIdx].n+"?"))return;
  EC.splice(catIdx,1);
  S.customCats=EC.map(function(c){return{n:c.n,sc:c.sc.slice(),cl:c.cl}});
  sv();toast("Eliminada");render();
}
function syncCats(){
  var ecNames=EC.map(function(e){return e.n});
  var count=0;
  S.txns=S.txns.map(function(t){
    if(ecNames.indexOf(t.category)===-1){
      var fixed=fixCatName(t.category);
      if(fixed!==t.category){count++;return Object.assign({},t,{category:fixed})}
    }
    return t;
  });
  sv();toast(count>0?count+" movimientos actualizados":"Todo sincronizado");render();
}
function addNewCat(){
  var name=Q("newCatName").value.trim();
  if(!name)return toast("Pon\u00e9 un nombre");
  var subs=Q("newCatSub").value.split(",").map(function(s){return s.trim()}).filter(function(s){return s});
  var colors=["#5dadec","#ffd166","#ff6b8a","#b68eff","#4ecdc4","#fab387","#89b4fa","#f7aef8"];
  EC.push({n:name,sc:subs.length?subs:["General"],cl:colors[EC.length%colors.length]});
  S.customCats=EC.map(function(c){return{n:c.n,sc:c.sc.slice()}});
  sv();toast("Categor\u00eda creada");render();
}
function toggleCheck(id,val){
  S.txns=S.txns.map(function(t){return t.id===id?Object.assign({},t,{checked:val}):t});
  sv();render();
}
function clearChecks(){
  var c=curM();
  S.txns=S.txns.map(function(t){
    if(t.month===c.m&&t.year===c.y)return Object.assign({},t,{checked:false});
    return t;
  });
  sv();render();
}

function delInv(id){if(!confirm("¿Eliminar inversión?"))return;S.inv=S.inv.filter(function(i){return i.id!==id});sv();toast("Eliminada");render()}

  var defaultNames=["Vivienda y servicios","Mercadería","Transporte","Ocio y salidas","Salud","Créditos","Educación","Estética","Servicios","Tecnología","Vestuario","Inversión","Impuestos","Emprendimiento","Ahorros"];
  EC.length=0;
  S.customCats.forEach(function(cc){EC.push({n:cc.n,sc:cc.sc.slice(),cl:cc.cl||"#5dadec"})});
  
  // Sync transactions: fix any category that doesn't exist in current EC
  var ecNames=EC.map(function(e){return e.n});
  var changed=false;
  S.txns=S.txns.map(function(t){
    if(ecNames.indexOf(t.category)===-1){
      // Category doesn't exist - try to find match by checking if any EC name is contained in old name or vice versa
      var match=EC.find(function(e){return t.category.indexOf(e.n)>-1||e.n.indexOf(t.category)>-1});
      if(match){changed=true;return Object.assign({},t,{category:match.n})}
    }
    return t;
  });
  if(changed)sv();
}
// Migrate old data
S.txns=S.txns.map(function(t){
  var est=Number(t.estimated)||0;
  var real=Number(t.realAmt)||Number(t.amount)||0;
  if(t.mode==="estimado"){est=Number(t.amount)||est;real=Number(t.realAmt)||0}
  return Object.assign({},t,{estimated:est,realAmt:real});
});
S.inv=S.inv.map(function(i){return i.risk!==undefined?i:Object.assign({},i,{risk:0,returnPct:0})});
S.goals=S.goals.map(function(g){return g.monthly!==undefined?g:Object.assign({},g,{monthly:0})});
sv();

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){initSelectors();render()})}else{initSelectors();render()}
</script>
</body>
